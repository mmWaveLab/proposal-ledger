name: Update proposal statistics

on:
  push:
    paths:
      - "applications/**"
      - "requirements.txt"
      - "scripts/generate_proposal_docx.py"
      - "scripts/update_stats.py"
      - "scripts/validate_ledger.py"
      - "scripts/review_proposals.py"
      - "README.md"
      - ".github/workflows/update-stats.yml"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install document generation dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Generate proposal DOCX files
        run: python3 scripts/generate_proposal_docx.py --all --output-dir exports/proposal-docx

      - name: Generate statistics
        run: python3 scripts/update_stats.py

      - name: Validate ledger
        run: python3 scripts/validate_ledger.py

      - name: Review proposal wording
        run: python3 scripts/review_proposals.py

      - name: Upload generated DOCX files
        uses: actions/upload-artifact@v4
        with:
          name: proposal-docx
          path: exports/proposal-docx/**/*.docx
          if-no-files-found: error
          retention-days: 1

      - name: Delete older proposal DOCX artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          gh api "repos/$REPO/actions/artifacts?name=proposal-docx&per_page=100" \
            --jq ".artifacts[] | select(.workflow_run.id != $RUN_ID) | .id" \
            | xargs -r -n1 -I{} gh api -X DELETE "repos/$REPO/actions/artifacts/{}"

      - name: Commit updated README
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update proposal statistics"
          file_pattern: README.md
